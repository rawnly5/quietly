name: build
on:
  push:
    branches: [main]
  pull_request:
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi --verbose
      - run: find . -name "*.apk" 2>/dev/null; echo "---"; find build -type d 2>/dev/null | head -20
      - uses: actions/upload-artifact@v4
        with: { name: apk, path: build/app/outputs/**/*.apk }

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
