name: quietly
description: Software ANC for any Bluetooth headphone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  in_app_purchase: ^3.2.0
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.1
  package_info_plus: ^8.0.0
  flutter_background_service: ^5.0.6
  flutter_local_notifications: ^17.1.2
  go_router: ^14.1.4
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/audio/
    - assets/images/
